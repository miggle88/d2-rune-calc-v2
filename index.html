<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D2 Rune Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Auth Overlay -->
  <div id="auth-overlay">
    <div id="auth-box">
      <h1 class="auth-title">Diablo II</h1>
      <p class="auth-subtitle">Rune Calculator</p>
      <div id="auth-tabs">
        <button class="auth-tab active" data-tab="signin">Sign In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>
      <form id="auth-form">
        <input id="auth-email" type="email" placeholder="Email" autocomplete="email" autocapitalize="none" autocorrect="off" required>
        <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password" required>
        <button id="auth-submit" type="submit">Sign In</button>
      </form>
      <p id="auth-error"></p>
    </div>
  </div>

  <div id="app">
    <header id="main-header">
      <div id="header-top">
        <div id="user-status">
          <span id="user-email"></span>
          <button id="logout-btn">Logout</button>
        </div>
      </div>
      <h1>Diablo II Rune Calculator</h1>
      <p class="subtitle">Horadric Cube &amp; Runeword Planner</p>
    </header>

    <section id="rune-grid-section">
      <h2 class="section-title">Rune Stash</h2>
      <div id="rune-grid"></div>
    </section>

    <div id="panels-container">
      <section id="runewords-panel">
        <h2 class="section-title">Runewords</h2>
        <div id="runeword-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="can-make">Can Make</button>
          <button class="filter-btn" data-filter="close">Close</button>
        </div>
        <div id="slot-filter-wrap">
          <select id="slot-filter">
            <option value="all">All Slot Types</option>
          </select>
        </div>
        <div id="runewords-list"></div>
      </section>

      <section id="upgrades-panel">
        <h2 class="section-title">Cube Upgrades</h2>
        <p class="panel-note">&#10033; Pul and above require a Flawless Gem</p>
        <div id="upgrades-list"></div>
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
